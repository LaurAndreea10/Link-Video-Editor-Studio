name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate repository structure
        run: npm run validate

      - name: Syntax check browser scripts
        run: |
          node --check assets/premium.js
          node --check assets/style-addon.js
          node --check assets/export-style-addon.js
          node --check assets/captions-addon.js
          node --check assets/keyframes-shorts-addon.js
          node --check scripts/run-plan.mjs
          node --check scripts/render-export.mjs
