name: Validate App

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify required files exist
        run: |
          test -f index.html
          test -f assets/app.js
          test -f assets/app.css
          test -f assets/presets.json
      - name: Validate presets JSON
        run: node -e "JSON.parse(require('fs').readFileSync('assets/presets.json','utf8')); console.log('presets.json valid')"
      - name: Validate JS module syntax
        run: node --check assets/app.js
