name: Render Video

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag release existent sau nou, ex: v1.0.0"
        required: true
        type: string
      plan_path:
        description: "Opțional: cale explicită către plan JSON din repo"
        required: false
        default: ""
        type: string
      create_release_if_missing:
        description: "Creează tag/release dacă nu există"
        required: false
        default: true
        type: boolean

  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure tag exists
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.create_release_if_missing == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.vars.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag exists: $TAG"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Detect committed plan file
        id: planfile
        shell: bash
        run: |
          set -euo pipefail
          INPUT_PLAN="${{ github.event.inputs.plan_path || '' }}"
          PLAN_FILE=""

          if [ -n "${INPUT_PLAN}" ]; then
            if [ -f "${INPUT_PLAN}" ]; then
              PLAN_FILE="${INPUT_PLAN}"
            else
              echo "Fișierul specificat nu există: ${INPUT_PLAN}"
              exit 1
            fi
          fi

          if [ -z "${PLAN_FILE}" ]; then
            PLAN_FILE="$(git diff-tree --no-commit-id --name-only -r HEAD | grep -E '(^|/)(plan\.json|.*\.plan\.json|output-plan\.json|sample-plan\.json)$' | head -n 1 || true)"
          fi

          if [ -z "${PLAN_FILE}" ]; then
            PLAN_FILE="$(git ls-files | grep -E '^(plans/.*(plan\.json|\.plan\.json)|examples/sample-plan\.json|.*(/plan\.json|\.plan\.json)|output-plan\.json)$' | head -n 1 || true)"
          fi

          if [ -z "${PLAN_FILE}" ]; then
            echo "Nu am găsit niciun plan JSON în repo."
            echo "Sugestii: plans/latest.plan.json, examples/sample-plan.json sau orice *.plan.json"
            exit 1
          fi

          BASENAME="$(basename "${PLAN_FILE}")"
          STEM="${BASENAME%.json}"
          SAFE_NAME="$(echo "${STEM}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-//;s/-$//')"

          echo "path=${PLAN_FILE}" >> "$GITHUB_OUTPUT"
          echo "safe_name=${SAFE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Show detected plan
        shell: bash
        run: |
          echo "Using plan: ${{ steps.planfile.outputs.path }}"
          ls -l "${{ steps.planfile.outputs.path }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Validate detected plan
        shell: bash
        run: |
          node -e "JSON.parse(require('fs').readFileSync('${{ steps.planfile.outputs.path }}','utf8')); console.log('Plan JSON valid')"

      - name: Run render from detected plan
        shell: bash
        run: |
          node scripts/run-plan.mjs "${{ steps.planfile.outputs.path }}" "${{ steps.planfile.outputs.safe_name }}-${{ steps.vars.outputs.tag }}"

      - name: Ensure rendered MP4 exists
        shell: bash
        run: |
          set -euo pipefail
          test -f output/final.mp4

      - name: Rename output for release
        shell: bash
        run: |
          mkdir -p release
          cp output/final.mp4 "release/${{ steps.planfile.outputs.safe_name }}-${{ steps.vars.outputs.tag }}.mp4"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video-${{ steps.planfile.outputs.safe_name }}-${{ steps.vars.outputs.tag }}
          path: release/*.mp4

      - name: Publish MP4 to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          append_body: true
          body: |
            Automated render generated by GitHub Actions.

            Plan source: `${{ steps.planfile.outputs.path }}`
          files: |
            release/*.mp4
